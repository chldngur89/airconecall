<!DOCTYPE html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- SEO — 제목·요약은 src/seo/siteContent.ts 과 동일 유지(Vite에서 주입) -->
    <title>%META_TITLE%</title>
    <meta name="description" content="%META_DESCRIPTION%" />
    <meta name="keywords" content="%KEYWORDS%" />
    <meta name="author" content="에어컨콜 · 대표자 최병성, 최우혁" />
    <meta name="publisher" content="에어컨콜" />
    <meta name="creator" content="에어컨콜" />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="googlebot" content="index,follow" />
    <meta name="format-detection" content="telephone=no" />

    <!-- 지역(GEO)·언어 신호 -->
    <meta name="geo.region" content="%GEO_REGION%" />
    <meta name="geo.placename" content="고양시,파주시,포천시,경기도,대한민국" />

    <!-- PWA 기본 -->
    <meta name="theme-color" content="#2563eb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1d4ed8" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="에어컨콜" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="에어컨콜" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Canonical / hreflang -->
    <link rel="canonical" href="%SITE_ORIGIN%/" />
    <link rel="alternate" hreflang="ko-KR" href="%SITE_ORIGIN%/" />
    <link rel="alternate" hreflang="x-default" href="%SITE_ORIGIN%/" />

    <!-- Open Graph — 답변·미리보기 엔진용 -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="에어컨콜" />
    <meta property="og:title" content="%META_TITLE%" />
    <meta property="og:description" content="%META_DESCRIPTION%" />
    <meta property="og:url" content="%SITE_ORIGIN%/" />
    <meta property="og:locale" content="ko_KR" />
    <meta property="og:image" content="%SITE_ORIGIN%/pwa-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="에어컨콜 — 고양·파주·포천 긴급 에어컨 매칭" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%META_TITLE%" />
    <meta name="twitter:description" content="%META_DESCRIPTION%" />
    <meta name="twitter:image" content="%SITE_ORIGIN%/pwa-512.png" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#2563eb" />

    <!-- Geo / AI 인용에 유리한 구조화 데이터 — siteContent·FAQ와 정합 -->
    <script type="application/ld+json">
%JSON_LD%
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
